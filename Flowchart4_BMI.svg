<?xml version="1.0" encoding="UTF-8"?>
<svg width="580" height="920" viewBox="0 0 580 920" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <text x="290" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a252f">Soal 4 – Kalkulator BMI</text>
  <text x="290" y="46" text-anchor="middle" font-size="11" fill="#555">Body Mass Index + Klasifikasi + Kode Python</text>

  <!-- START -->
  <ellipse cx="290" cy="80" rx="60" ry="22" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="290" y="85" text-anchor="middle" font-size="13" fill="#1a252f">Mulai</text>
  <line x1="290" y1="102" x2="290" y2="130" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Deklarasi -->
  <rect x="170" y="132" width="240" height="44" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="290" y="150" text-anchor="middle" font-size="12" fill="#1a252f">Integer Berat</text>
  <text x="290" y="168" text-anchor="middle" font-size="12" fill="#1a252f">Real Tinggi, BMI</text>
  <line x1="290" y1="176" x2="290" y2="204" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output berat -->
  <polygon points="160,206 420,206 410,228 170,228" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="290" y="221" text-anchor="middle" font-size="12" fill="#1a252f">"Masukkan Berat Badan (kg):"</text>
  <line x1="290" y1="228" x2="290" y2="254" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input berat -->
  <polygon points="175,256 405,256 415,276 165,276" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="290" y="271" text-anchor="middle" font-size="12" fill="#1a252f">Input Berat</text>
  <line x1="290" y1="276" x2="290" y2="302" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output tinggi -->
  <polygon points="160,304 420,304 410,326 170,326" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="290" y="319" text-anchor="middle" font-size="12" fill="#1a252f">"Masukkan Tinggi Badan (cm):"</text>
  <line x1="290" y1="326" x2="290" y2="352" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input tinggi -->
  <polygon points="175,354 405,354 415,374 165,374" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="290" y="369" text-anchor="middle" font-size="12" fill="#1a252f">Input Tinggi</text>
  <line x1="290" y1="374" x2="290" y2="400" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Konversi dan hitung BMI -->
  <rect x="150" y="402" width="280" height="44" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="290" y="420" text-anchor="middle" font-size="12" fill="#1a252f">TinggiM = Tinggi / 100</text>
  <text x="290" y="438" text-anchor="middle" font-size="12" fill="#1a252f">BMI = Berat / (TinggiM × TinggiM)</text>
  <line x1="290" y1="446" x2="290" y2="474" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output BMI -->
  <polygon points="160,476 420,476 410,498 170,498" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="290" y="492" text-anchor="middle" font-size="12" fill="#1a252f">Output "Nilai BMI: " + BMI</text>
  <line x1="290" y1="498" x2="290" y2="524" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond BMI < 18.5 -->
  <polygon points="290,526 400,556 290,586 180,556" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="290" y="551" text-anchor="middle" font-size="12" fill="#1a252f">BMI &lt; 18.5?</text>
  <line x1="400" y1="556" x2="470" y2="556" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="432" y="549" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="470,540 560,540 552,560 478,560" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="515" y="554" text-anchor="middle" font-size="11" fill="#1a252f">Kurus</text>

  <!-- Tidak -> BMI < 25 -->
  <line x1="290" y1="586" x2="290" y2="612" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="278" y="602" font-size="10" fill="#e74c3c" font-weight="bold">Tidak</text>
  <polygon points="290,614 400,644 290,674 180,644" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="290" y="639" text-anchor="middle" font-size="12" fill="#1a252f">BMI &lt; 25?</text>
  <line x1="400" y1="644" x2="470" y2="644" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="432" y="637" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="470,628 560,628 552,648 478,648" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="515" y="642" text-anchor="middle" font-size="11" fill="#1a252f">Normal</text>

  <!-- Tidak -> BMI < 30 -->
  <line x1="290" y1="674" x2="290" y2="700" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="278" y="690" font-size="10" fill="#e74c3c" font-weight="bold">Tidak</text>
  <polygon points="290,702 400,732 290,762 180,732" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="290" y="727" text-anchor="middle" font-size="12" fill="#1a252f">BMI &lt; 30?</text>
  <line x1="400" y1="732" x2="470" y2="732" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="432" y="725" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="470,716 560,716 552,736 478,736" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="515" y="730" text-anchor="middle" font-size="11" fill="#1a252f">Gemuk</text>

  <!-- Tidak -> Obesitas -->
  <line x1="290" y1="762" x2="290" y2="790" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="278" y="778" font-size="10" fill="#e74c3c" font-weight="bold">Tidak</text>
  <polygon points="220,792 360,792 352,812 228,812" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="290" y="806" text-anchor="middle" font-size="12" fill="#1a252f">Obesitas (≥30)</text>

  <!-- All merge down -->
  <!-- Kurus arrow down -->
  <line x1="515" y1="560" x2="515" y2="850" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="515" y1="850" x2="350" y2="850" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Normal arrow down -->
  <line x1="515" y1="648" x2="515" y2="850" stroke="#2c3e50" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Gemuk arrow down -->
  <line x1="515" y1="736" x2="515" y2="850" stroke="#2c3e50" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Obesitas arrow down -->
  <line x1="290" y1="812" x2="290" y2="850" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="290" y1="850" x2="347" y2="850" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- END -->
  <ellipse cx="350" cy="870" rx="60" ry="22" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="350" y="875" text-anchor="middle" font-size="13" fill="#1a252f">Selesai</text>
</svg>
