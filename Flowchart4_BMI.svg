<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="1060" viewBox="0 0 600 1060" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a252f">Soal 4 – Kalkulator BMI</text>
  <text x="300" y="50" text-anchor="middle" font-size="12" fill="#555">Body Mass Index + Klasifikasi + Kode Python</text>

  <ellipse cx="250" cy="80" rx="60" ry="24" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="85" text-anchor="middle" font-size="13" fill="#1a252f">Mulai</text>
  <line x1="250" y1="104" x2="250" y2="130" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="130" y="130" width="240" height="40" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="250" y="146" text-anchor="middle" font-size="12" fill="#1a252f">Integer Berat</text>
  <text x="250" y="162" text-anchor="middle" font-size="12" fill="#1a252f">Real Tinggi, BMI, TinggiM</text>
  <line x1="250" y1="170" x2="250" y2="205" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="120,205 380,205 370,235 130,235" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="224" text-anchor="middle" font-size="12" fill="#1a252f">"Masukkan Berat Badan (kg):"</text>
  <line x1="250" y1="235" x2="250" y2="275" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="140,275 360,275 370,305 130,305" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="250" y="294" text-anchor="middle" font-size="12" fill="#1a252f">Input Berat</text>
  <line x1="250" y1="305" x2="250" y2="345" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="120,345 380,345 370,375 130,375" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="364" text-anchor="middle" font-size="12" fill="#1a252f">"Masukkan Tinggi Badan (cm):"</text>
  <line x1="250" y1="375" x2="250" y2="415" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="140,415 360,415 370,445 130,445" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="250" y="434" text-anchor="middle" font-size="12" fill="#1a252f">Input Tinggi</text>
  <line x1="250" y1="445" x2="250" y2="487" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="487" width="280" height="46" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="250" y="506" text-anchor="middle" font-size="12" fill="#1a252f">TinggiM = Tinggi / 100</text>
  <text x="250" y="522" text-anchor="middle" font-size="12" fill="#1a252f">BMI = Berat / (TinggiM × TinggiM)</text>
  <line x1="250" y1="533" x2="250" y2="575" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="120,575 380,575 370,605 130,605" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="594" text-anchor="middle" font-size="12" fill="#1a252f">Output "Nilai BMI: " + BMI</text>
  <line x1="250" y1="605" x2="250" y2="640" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="250,640 360,670 250,700 140,670" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="250" y="674" text-anchor="middle" font-size="12" fill="#1a252f">BMI &lt; 18.5?</text>
  
  <line x1="360" y1="670" x2="430" y2="670" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="663" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="430,655 520,655 510,685 440,685" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="475" y="674" text-anchor="middle" font-size="11" fill="#1a252f" font-weight="bold">KURUS</text>

  <line x1="250" y1="700" x2="250" y2="730" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="718" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">Tidak</text>

  <polygon points="250,730 360,760 250,790 140,760" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="250" y="764" text-anchor="middle" font-size="12" fill="#1a252f">BMI &lt; 25?</text>

  <line x1="360" y1="760" x2="430" y2="760" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="753" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="430,745 520,745 510,775 440,775" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="475" y="764" text-anchor="middle" font-size="11" fill="#1a252f" font-weight="bold">NORMAL</text>

  <line x1="250" y1="790" x2="250" y2="820" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="808" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">Tidak</text>

  <polygon points="250,820 360,850 250,880 140,850" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="250" y="854" text-anchor="middle" font-size="12" fill="#1a252f">BMI &lt; 30?</text>

  <line x1="360" y1="850" x2="430" y2="850" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="843" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="430,835 520,835 510,865 440,865" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="475" y="854" text-anchor="middle" font-size="11" fill="#1a252f" font-weight="bold">GEMUK</text>

  <line x1="250" y1="880" x2="250" y2="910" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="898" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">Tidak</text>

  <polygon points="170,910 330,910 320,940 180,940" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="250" y="929" text-anchor="middle" font-size="12" fill="#1a252f" font-weight="bold">OBESITAS (≥30)</text>

  <line x1="250" y1="940" x2="250" y2="976" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="520" y1="670" x2="560" y2="670" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="520" y1="760" x2="560" y2="760" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="520" y1="850" x2="560" y2="850" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="560" y1="670" x2="560" y2="960" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="560" y1="960" x2="250" y2="960" stroke="#2c3e50" stroke-width="1.5"/>

  <ellipse cx="250" cy="1000" rx="60" ry="24" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="1005" text-anchor="middle" font-size="13" fill="#1a252f">Selesai</text>
</svg>
