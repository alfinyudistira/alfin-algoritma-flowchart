<?xml version="1.0" encoding="UTF-8"?>
<svg width="620" height="700" viewBox="0 0 620 700" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <text x="310" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a252f">Soal 2 – Tahun Kabisat</text>
  <text x="310" y="46" text-anchor="middle" font-size="11" fill="#555">Uji: 2000, 1900, 2024, 2023</text>

  <!-- START -->
  <ellipse cx="310" cy="85" rx="60" ry="24" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="310" y="90" text-anchor="middle" font-size="13" fill="#1a252f">Mulai</text>
  <line x1="310" y1="109" x2="310" y2="138" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Deklarasi -->
  <rect x="210" y="140" width="200" height="36" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="310" y="163" text-anchor="middle" font-size="12" fill="#1a252f">Integer Tahun</text>
  <line x1="310" y1="176" x2="310" y2="205" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output prompt -->
  <polygon points="185,207 435,207 425,232 195,232" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="310" y="224" text-anchor="middle" font-size="12" fill="#1a252f">"Masukkan angka Tahun:"</text>
  <line x1="310" y1="232" x2="310" y2="261" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input -->
  <polygon points="200,263 420,263 430,283 190,283" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="310" y="278" text-anchor="middle" font-size="12" fill="#1a252f">Input Tahun</text>
  <line x1="310" y1="283" x2="310" y2="312" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond 1: Tahun % 400 = 0 -->
  <polygon points="310,314 430,354 310,394 190,354" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="310" y="349" text-anchor="middle" font-size="12" fill="#1a252f">Tahun % 400 = 0?</text>
  <text x="310" y="365" text-anchor="middle" font-size="10" fill="#666">(habis dibagi 400)</text>

  <!-- True -> Kabisat -->
  <line x1="430" y1="354" x2="530" y2="354" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="476" y="347" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="530,338 590,338 582,358 538,358" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="560" y="353" text-anchor="middle" font-size="11" fill="#1a252f">KABISAT</text>
  <!-- arrow down from kabisat to end -->
  <line x1="560" y1="358" x2="560" y2="580" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="560" y1="580" x2="368" y2="580" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- False -> Diamond 2: Tahun % 100 = 0 -->
  <line x1="310" y1="394" x2="310" y2="423" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="298" y="412" font-size="11" fill="#e74c3c" font-weight="bold">Tidak</text>

  <polygon points="310,425 430,465 310,505 190,465" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="310" y="460" text-anchor="middle" font-size="12" fill="#1a252f">Tahun % 100 = 0?</text>
  <text x="310" y="476" text-anchor="middle" font-size="10" fill="#666">(habis dibagi 100)</text>

  <!-- True % 100 = bukan kabisat -->
  <line x1="430" y1="465" x2="530" y2="465" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="476" y="458" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Ya</text>
  <polygon points="530,449 600,449 592,469 538,469" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="565" y="464" text-anchor="middle" font-size="11" fill="#1a252f">BUKAN</text>
  <line x1="565" y1="469" x2="565" y2="580" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="565" y1="580" x2="370" y2="580" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- False % 100 -> Diamond 3: Tahun % 4 = 0 -->
  <line x1="310" y1="505" x2="310" y2="534" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="298" y="523" font-size="11" fill="#e74c3c" font-weight="bold">Tidak</text>

  <polygon points="310,536 410,566 310,596 210,566" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="310" y="561" text-anchor="middle" font-size="12" fill="#1a252f">Tahun % 4 = 0?</text>
  <text x="310" y="576" text-anchor="middle" font-size="10" fill="#666">(habis dibagi 4)</text>

  <!-- False % 4 -> Bukan kabisat -->
  <line x1="210" y1="566" x2="90" y2="566" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="153" y="558" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">Tidak</text>
  <polygon points="30,550 110,550 102,570 38,570" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="70" y="565" text-anchor="middle" font-size="11" fill="#1a252f">BUKAN</text>
  <line x1="70" y1="570" x2="70" y2="610" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="70" y1="610" x2="300" y2="610" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- True % 4 -> Kabisat -->
  <line x1="410" y1="566" x2="490" y2="566" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="447" y="558" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Ya</text>
  <line x1="490" y1="566" x2="490" y2="600" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="490" y1="600" x2="375" y2="610" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END -->
  <ellipse cx="335" cy="630" rx="60" ry="24" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="335" y="635" text-anchor="middle" font-size="13" fill="#1a252f">Selesai</text>
</svg>
