import graphviz
from google.colab import files

# Membuat canvas diagram dari atas ke bawah
dot = graphviz.Digraph(comment='Flowchart Tahun Kabisat')
dot.attr(rankdir='TB', size='10,10')
dot.attr('node', fontname='Helvetica', shape='box', style='filled')

# Deklarasi bentuk dan warna (mirip standar Flowgorithm)
dot.node('Start', 'Mulai', shape='ellipse', fillcolor='#d5e8d4', color='#82b366')
dot.node('Input', 'Input Tahun', shape='parallelogram', fillcolor='#dae8fc', color='#6c8ebf')

dot.node('Cek400', 'Tahun % 400 == 0?', shape='diamond', fillcolor='#ffe6cc', color='#d79b00')
dot.node('Kabisat1', 'Output\n"Tahun Kabisat"', shape='parallelogram', fillcolor='#d5e8d4', color='#82b366')

dot.node('Cek100', 'Tahun % 100 == 0?', shape='diamond', fillcolor='#ffe6cc', color='#d79b00')
dot.node('Bukan1', 'Output\n"Bukan Kabisat"', shape='parallelogram', fillcolor='#f8cecc', color='#b85450')

dot.node('Cek4', 'Tahun % 4 == 0?', shape='diamond', fillcolor='#ffe6cc', color='#d79b00')
dot.node('Kabisat2', 'Output\n"Tahun Kabisat"', shape='parallelogram', fillcolor='#d5e8d4', color='#82b366')
dot.node('Bukan2', 'Output\n"Bukan Kabisat"', shape='parallelogram', fillcolor='#f8cecc', color='#b85450')

dot.node('End', 'Selesai', shape='ellipse', fillcolor='#d5e8d4', color='#82b366')

# Menyambungkan garis antar komponen
dot.edge('Start', 'Input')
dot.edge('Input', 'Cek400')

# Diamond 1
dot.edge('Cek400', 'Kabisat1', label=' True')
dot.edge('Cek400', 'Cek100', label=' False')

# Diamond 2
dot.edge('Cek100', 'Bukan1', label=' True')
dot.edge('Cek100', 'Cek4', label=' False')

# Diamond 3
dot.edge('Cek4', 'Kabisat2', label=' True')
dot.edge('Cek4', 'Bukan2', label=' False')

# Menyambungkan ke End
dot.edge('Kabisat1', 'End')
dot.edge('Bukan1', 'End')
dot.edge('Kabisat2', 'End')
dot.edge('Bukan2', 'End')

# Render dan Download gambar
dot.render('flowchart_kabisat_the_top', format='png', cleanup=True)
files.download('flowchart_kabisat_the_top.png')
print("✅ Diagram The Top berhasil di-download!")
