<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="820" viewBox="0 0 500 820" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a252f" font-family="Georgia, serif">Soal 1 – Konversi Suhu</text>
  <text x="250" y="48" text-anchor="middle" font-size="11" fill="#555" font-family="Georgia, serif">Celsius → Fahrenheit dan Kelvin</text>

  <!-- START -->
  <ellipse cx="250" cy="90" rx="60" ry="24" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="95" text-anchor="middle" font-size="13" fill="#1a252f">Mulai</text>

  <!-- Arrow -->
  <line x1="250" y1="114" x2="250" y2="148" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Deklarasi -->
  <rect x="150" y="150" width="200" height="44" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="250" y="168" text-anchor="middle" font-size="12" fill="#1a252f">Real Celsius</text>
  <text x="250" y="185" text-anchor="middle" font-size="12" fill="#1a252f">Real Fahrenheit, Kelvin</text>

  <line x1="250" y1="194" x2="250" y2="228" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output prompt -->
  <polygon points="150,230 350,230 340,260 160,260" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="250" text-anchor="middle" font-size="12" fill="#1a252f">"Masukkan Suhu (°C):"</text>

  <line x1="250" y1="260" x2="250" y2="294" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input -->
  <polygon points="160,296 340,296 350,316 150,316" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="250" y="311" text-anchor="middle" font-size="12" fill="#1a252f">Input Celsius</text>

  <line x1="250" y1="316" x2="250" y2="350" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hitung F -->
  <rect x="130" y="352" width="240" height="40" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="250" y="368" text-anchor="middle" font-size="12" fill="#1a252f">Fahrenheit = (9/5 × Celsius) + 32</text>
  <text x="250" y="384" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Konversi ke Fahrenheit</text>

  <line x1="250" y1="392" x2="250" y2="426" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hitung K -->
  <rect x="130" y="428" width="240" height="40" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="250" y="444" text-anchor="middle" font-size="12" fill="#1a252f">Kelvin = Celsius + 273.15</text>
  <text x="250" y="460" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Konversi ke Kelvin</text>

  <line x1="250" y1="468" x2="250" y2="502" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output hasil -->
  <polygon points="130,504 370,504 360,534 140,534" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="519" text-anchor="middle" font-size="12" fill="#1a252f">Output Fahrenheit</text>
  <text x="250" y="532" text-anchor="middle" font-size="11" fill="#1a252f">Output Kelvin</text>

  <line x1="250" y1="534" x2="250" y2="568" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END -->
  <ellipse cx="250" cy="590" rx="60" ry="24" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="250" y="595" text-anchor="middle" font-size="13" fill="#1a252f">Selesai</text>

  <!-- Legend -->
  <rect x="20" y="650" width="460" height="140" rx="6" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="250" y="670" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Keterangan Simbol</text>
  <ellipse cx="55" cy="695" rx="30" ry="14" fill="#d5e8d4" stroke="#82b366" stroke-width="1.2"/>
  <text x="95" y="699" font-size="11" fill="#333">= Mulai / Selesai (Terminal)</text>
  <rect x="25" y="718" width="60" height="20" rx="3" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <text x="95" y="732" font-size="11" fill="#333">= Proses / Perhitungan</text>
  <polygon points="25,754 85,754 78,770 32,770" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="95" y="766" font-size="11" fill="#333">= Input</text>
  <polygon points="25,778 85,778 78,794 32,794" fill="#d5e8d4" stroke="#82b366" stroke-width="1.2"/>
  <text x="95" y="790" font-size="11" fill="#333">= Output</text>
</svg>
